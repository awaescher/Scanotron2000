name: .NET Build, Test and Publish

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Fetch all history for all tags and branches
      run: |
        git config remote.origin.url https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        git fetch --prune --unshallow

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v0.9.7
      with:
          versionSpec: '5.x'
    
    - name: Use GitVersion
      id: gitversion # step id used as reference for output values
      uses: gittools/actions/gitversion/execute@v0.9.7
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: | 
          9.0.x

    - name: Restore dependencies
      run: dotnet restore scanotron.sln
      
    - name: Build
      run: dotnet build --no-restore --configuration=Release /p:Version=${{steps.gitversion.outputs.semVer}}

    - name: Test
      run: dotnet test --no-build --configuration=Release --verbosity normal

    - name: Publish for Windows x64 (Self-contained)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=win-x64 --self-contained=true --output=./publish/win-x64 -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for Linux x64 (Self-contained)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=linux-x64 --self-contained=true --output=./publish/linux-x64 -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for macOS Intel x64 (Self-contained)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=osx-x64 --self-contained=true --output=./publish/osx-intel-x64 -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for macOS ARM64 (Self-contained)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=osx-arm64 --self-contained=true --output=./publish/osx-arm64 -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for Windows x64 (Framework-dependent)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=win-x64 --self-contained=false --output=./publish/win-x64-framework-dependent -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for Linux x64 (Framework-dependent)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=linux-x64 --self-contained=false --output=./publish/linux-x64-framework-dependent -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for macOS Intel x64 (Framework-dependent)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=osx-x64 --self-contained=false --output=./publish/osx-intel-x64-framework-dependent -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Publish for macOS ARM64 (Framework-dependent)
      run: dotnet publish scanotron.csproj --configuration=Release --runtime=osx-arm64 --self-contained=false --output=./publish/osx-arm64-framework-dependent -p:PublishSingleFile=true /p:Version=${{steps.gitversion.outputs.semVer}}
      if: github.event_name != 'pull_request'

    - name: Sign macOS binaries
      run: |
        # Ad-hoc code signing for macOS binaries (works without Developer ID)
        codesign --force --sign - ./publish/osx-arm64/scanotron || echo "Code signing failed for ARM64, but continuing..."
        codesign --force --sign - ./publish/osx-intel-x64/scanotron || echo "Code signing failed for Intel, but continuing..."
        
        # Verify signing
        codesign --verify --verbose ./publish/osx-arm64/scanotron || echo "Verification failed for ARM64"
        codesign --verify --verbose ./publish/osx-intel-x64/scanotron || echo "Verification failed for Intel"
        
        # Also sign framework-dependent versions
        codesign --force --sign - ./publish/osx-arm64-framework-dependent/scanotron || echo "Code signing failed for ARM64 framework-dependent, but continuing..."
        codesign --force --sign - ./publish/osx-intel-x64-framework-dependent/scanotron || echo "Code signing failed for Intel framework-dependent, but continuing..."
      if: github.event_name != 'pull_request'

    - name: Create ZIP archives
      run: |
        cd publish
        # Traditional binary archives
        zip -r ../scanotron-win-x64-self-contained-${{steps.gitversion.outputs.semVer}}.zip win-x64/
        tar -czf ../scanotron-linux-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz -C linux-x64 .
        tar -czf ../scanotron-osx-intel-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz -C osx-intel-x64 .
        tar -czf ../scanotron-osx-arm64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz -C osx-arm64 .
        zip -r ../scanotron-win-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.zip win-x64-framework-dependent/
        tar -czf ../scanotron-linux-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz -C linux-x64-framework-dependent .
        tar -czf ../scanotron-osx-intel-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz -C osx-intel-x64-framework-dependent .
        tar -czf ../scanotron-osx-arm64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz -C osx-arm64-framework-dependent .
      if: github.event_name != 'pull_request'

    - name: Create a GitHub release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{steps.gitversion.outputs.semVer}}
        name: Release ${{steps.gitversion.outputs.semVer}}
        artifacts: |
          scanotron-win-x64-self-contained-${{steps.gitversion.outputs.semVer}}.zip
          scanotron-linux-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz
          scanotron-osx-intel-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz
          scanotron-osx-arm64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz
          scanotron-win-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.zip
          scanotron-linux-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz
          scanotron-osx-intel-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz
          scanotron-osx-arm64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz
        body: |
          ## Release ${{steps.gitversion.outputs.semVer}}
          
          ### Self-Contained Downloads (Recommended for most users)
          **Single executable file - No .NET installation required - Ready to run immediately**
          - **Windows x64**: `scanotron-win-x64-self-contained-${{steps.gitversion.outputs.semVer}}.zip`
          - **Linux x64**: `scanotron-linux-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz`
          - **macOS Intel (x64)**: `scanotron-osx-intel-x64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz`
          - **macOS Apple Silicon (ARM64)**: `scanotron-osx-arm64-self-contained-${{steps.gitversion.outputs.semVer}}.tar.gz`
          
          ### Framework-Dependent Downloads (Smaller size)
          **Single executable file - Requires .NET 9.0 Runtime to be installed**
          - **Windows x64**: `scanotron-win-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.zip`
          - **Linux x64**: `scanotron-linux-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz`
          - **macOS Intel (x64)**: `scanotron-osx-intel-x64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz`
          - **macOS Apple Silicon (ARM64)**: `scanotron-osx-arm64-framework-dependent-${{steps.gitversion.outputs.semVer}}.tar.gz`
          
          ---
          
          **macOS users**: The binaries are now code-signed and should run without security warnings!
          
          **Which version should I choose?**
          - **Self-contained**: Choose this if you want the easiest setup. Single executable file (~50-100MB) that works immediately
          - **Framework-dependent**: Choose this if you have .NET 9.0 installed. Smaller download (~5-20MB) but requires [.NET 9.0 Runtime](https://dotnet.microsoft.com/download/dotnet/9.0)
      if: github.event_name != 'pull_request'
