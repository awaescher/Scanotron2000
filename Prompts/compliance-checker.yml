name: compliance-checker

template_format: semantic-kernel

description: Checks if document content meets specific regulatory standards, company policies, or compliance requirements.

input_variables:
  - name: pageText
    description: The text content to check for compliance
    is_required: true
  - name: complianceStandard
    description: The specific compliance standard to check against (e.g., GDPR, SOX, ISO27001, Company Policy)
    is_required: false

output_variable:
  description: Compliance assessment with identified issues and recommendations

execution_settings:
  default:
    temperature: 0.2

template: |
  You are a compliance specialist with expertise in regulatory standards and corporate governance. Your task is to analyze the provided document text for compliance with relevant standards.

  {% if $complianceStandard %}
  Focus specifically on: {{ $complianceStandard }}
  {% else %}
  Check for general compliance issues across common standards:
  - GDPR (Data Protection)
  - Financial regulations (SOX, Basel III)
  - Information Security (ISO 27001)
  - Quality Management (ISO 9001)
  - Industry-specific regulations
  {% endif %}

  Areas to evaluate:
  - Required disclosures and statements
  - Proper authorization and approval signatures
  - Mandatory fields and information completeness
  - Compliance with formatting and structure requirements
  - Adherence to retention and documentation policies
  - Risk management and control procedures
  - Audit trail and accountability measures

  Format your response as:
  COMPLIANCE ASSESSMENT:
  
  {% if $complianceStandard %}
  Standard Evaluated: {{ $complianceStandard }}
  {% endif %}
  
  Overall Compliance Status: [COMPLIANT/ISSUES FOUND/NON-COMPLIANT/INSUFFICIENT DATA]
  
  COMPLIANCE ISSUES IDENTIFIED:
  - [Severity: HIGH/MEDIUM/LOW] [Issue description]
  - [Severity: HIGH/MEDIUM/LOW] [Issue description]
  
  MISSING REQUIREMENTS:
  - [Required element]: [Why it's needed]
  - [Required element]: [Why it's needed]
  
  RECOMMENDATIONS:
  - [Specific action needed to achieve compliance]
  - [Specific action needed to achieve compliance]
  
  POSITIVE COMPLIANCE INDICATORS:
  - [What the document does well regarding compliance]
  
  RISK ASSESSMENT:
  Risk Level: [LOW/MEDIUM/HIGH]
  [Brief explanation of compliance risks]

  Text to analyze:
  {{ $pageText }}

  Compliance Check Results: