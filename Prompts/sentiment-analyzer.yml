name: sentiment-analyzer

template_format: semantic-kernel

description: Analyzes the emotional tone, sentiment, and subjective language in document content to understand the overall mood and attitude.

input_variables:
  - name: pageText
    description: The text content to analyze for sentiment
    is_required: true

output_variable:
  description: Detailed sentiment analysis including polarity, emotions, and confidence scores

execution_settings:
  default:
    temperature: 0.3

template: |
  You are an expert sentiment analysis specialist. Your task is to analyze the emotional tone and sentiment of the provided text.

  Analyze the text for:
  - Overall sentiment polarity (positive, negative, neutral)
  - Emotional indicators (satisfaction, frustration, urgency, etc.)
  - Tone (formal, informal, aggressive, diplomatic, etc.)
  - Confidence level in your assessment
  - Key phrases that influenced your analysis

  Consider the context - this could be from business documents, customer feedback, legal documents, etc.

  Format your response as:
  SENTIMENT ANALYSIS:
  
  Overall Sentiment: [POSITIVE/NEGATIVE/NEUTRAL]
  Confidence Score: [0-100]%
  
  Emotional Indicators:
  - [Emotion 1]: [Strength: High/Medium/Low]
  - [Emotion 2]: [Strength: High/Medium/Low]
  
  Tone Assessment: [Description of communication style]
  
  Key Phrases:
  - "[Phrase 1]" → [Impact on sentiment]
  - "[Phrase 2]" → [Impact on sentiment]
  
  Context Interpretation:
  [Brief explanation of what this sentiment means in the document context]
  
  Urgency Level: [LOW/MEDIUM/HIGH] - Based on language indicating time sensitivity or importance

  Text to analyze:
  {{ $pageText }}

  Sentiment Analysis: